<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word & Character Counter</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #333; margin-bottom: 5px; }
        p.info { font-size: 14px; color: #666; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; resize: none; font-size: 16px; box-sizing: border-box; }
        .stats { display: flex; justify-content: space-around; margin-top: 20px; }
        .stat-box { background: #eef2ff; padding: 15px; border-radius: 5px; width: 45%; }
        .stat-box h3 { margin: 0; font-size: 24px; color: #4f46e5; }
        .stat-box p { margin: 5px 0 0; color: #555; }
        .btn-dh { display: inline-block; margin-top: 25px; padding: 10px 20px; background-color: #000; color: #fff; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .btn-dh:hover { background-color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>Word & Character Counter</h1>
    <p class="info">Built by: <strong>Momeen junaid fakira</strong> (<a href="mailto: mominjuned622@gmail.com">aapkaemail@gmail.com</a>)</p>

    <textarea id="text-input" placeholder="Yahan apna text type ya paste karein..."></textarea>

    <div class="stats">
        <div class="stat-box">
            <h3 id="word-count">0</h3>
            <p>Words</p>
        </div>
        <div class="stat-box">
            <h3 id="char-count">0</h3>
            <p>Characters</p>
        </div>
    </div>

    <a href="https://digitalheroesco.com" target="_blank" class="btn-dh">Built for Digital Heroes</a>
</div>

<script>
    const textInput = document.getElementById('text-input');
    const wordCount = document.getElementById('word-count');
    const charCount = document.getElementById('char-count');

    textInput.addEventListener('input', () => {
        const text = textInput.value;
        
        // Character count
        charCount.textContent = text.length;
        
        // Word count
        const words = text.trim().split(/\s+/).filter(word => word.length > 0);
        wordCount.textContent = words.length;
    });
</script>

</body>
</html>
