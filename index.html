<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Word & Character Counter</title>
       <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #ffffff; padding: 40px 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 550px; text-align: center; }
        h1 { color: #2d3748; font-size: 28px; margin-bottom: 8px; font-weight: 700; }
        .info { font-size: 14px; color: #718096; margin-bottom: 25px; line-height: 1.5; }
        .info strong { color: #4a5568; }
        .info a { color: #667eea; text-decoration: none; font-weight: 600; }
        textarea { width: 100%; height: 180px; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; resize: none; font-size: 16px; color: #4a5568; transition: all 0.3s ease; background: #f7fafc; }
        textarea:focus { outline: none; border-color: #667eea; background: #fff; box-shadow: 0 0 10px rgba(102, 126, 234, 0.2); }
        .stats { display: flex; justify-content: space-between; margin-top: 25px; gap: 15px; }
        .stat-box { background: #f8fafc; padding: 20px; border-radius: 12px; width: 50%; border: 1px solid #edf2f7; transition: transform 0.2s; }
        .stat-box:hover { transform: translateY(-3px); }
        .stat-box h3 { margin: 0; font-size: 32px; color: #764ba2; font-weight: 700; }
        .stat-box p { margin-top: 5px; color: #4a5568; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-dh { display: inline-block; margin-top: 30px; padding: 14px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 15px; letter-spacing: 0.5px; box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3); transition: all 0.3s ease; width: 100%; }
        .btn-dh:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4); }
    </style>
</head>
<body>

<div class="container">
    <h1>Word & Character Counter</h1>
    <p class="info">Built by: <strong>momeen junaid fakira</strong> | <a href="mailto: mominjuned622@gmail.com">mominjuned622@gmail.com</a></p>

    <textarea id="text-input" placeholder="Yahan apna text type ya paste karein..."></textarea>

    <div class="stats">
        <div class="stat-box">
            <h3 id="word-count">0</h3>
            <p>Words</p>
        </div>
        <div class="stat-box">
            <h3 id="char-count">0</h3>
            <p>Characters</p>
        </div>
    </div>

    <a href="https://digitalheroesco.com" target="_blank" class="btn-dh">Built for Digital Heroes</a>
</div>
    <script>
    const textInput = document.getElementById('text-input');
    const wordCount = document.getElementById('word-count');
    const charCount = document.getElementById('char-count');

    textInput.addEventListener('input', () => {
        const text = textInput.value;
        
        // Character count
        charCount.textContent = text.length;
        
        // Word count
        const words = text.trim().split(/\s+/).filter(word => word.length > 0);
        wordCount.textContent = words.length;
    });
</script>

</body>
</html>
